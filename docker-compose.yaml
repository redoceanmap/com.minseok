services:
  backend:
    build:
      context: ./minseok
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./minseok:/app
    environment:
      - ENV=development

  frontend:
    build:
      context: ./www
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./www:/app
      - /app/.next
      - /app/node_modules
    environment:
      - NODE_ENV=production

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/

volumes:
  n8n_data:
    name: n8n_data
